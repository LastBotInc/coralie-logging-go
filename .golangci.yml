version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - gosec
    - bodyclose
  settings:
    gosec:
      excludes:
        - G115
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
