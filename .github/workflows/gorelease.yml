name: API Compatibility Check

on:
  pull_request:
    branches:
      - main

jobs:
  gorelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # REQUIRED: gorelease needs full tag history

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install gorelease
        run: go install golang.org/x/exp/cmd/gorelease@latest

      - name: Run gorelease
        id: gorelease
        run: |
          set +e
          OUTPUT=$(gorelease 2>&1)
          EXIT_CODE=$?
          set -e
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT"
          # For v0.x.x modules, gorelease does not fail on incompatible changes.
          # Explicitly check for incompatible changes and fail.
          if echo "$OUTPUT" | grep -qi "incompatible changes"; then
            echo "::error::Breaking API changes detected. Bump minor version (breaking changes in v0.x) or fix the API."
            exit 1
          fi
          exit $EXIT_CODE

      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ## API Compatibility Report (gorelease)
            ```
            ${{ steps.gorelease.outputs.output }}
            ```

            > Auto-generated by gorelease. Incompatible changes in exported API will block this PR.
