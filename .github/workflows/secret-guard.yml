name: secret-guard
# Fail-closed CI backstop for the .githooks/pre-commit secret guard.
#
# A developer-side pre-commit hook only fires when installed; this job runs
# the same checks on every PR so a missing or bypassed hook cannot land a
# .env or sensitive KEY=value diff. Recurrence prevention for the
# 2026-06-17 coralie-gemini-worker .env leak (umbrella:
# docs/policies/SECURITY_HYGIENE.md).

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            # push to main: diff vs the previous commit
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            # Initial push to a fresh branch has before=000...0; fall back to HEAD~1.
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Block .env and secret-shaped files
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          if [ -z "$base" ]; then
            echo "No base ref; nothing to diff." && exit 0
          fi

          changed="$(git diff --name-only --diff-filter=AM "$base" "$head" || true)"
          added="$(git diff --name-only --diff-filter=A "$base" "$head" || true)"
          if [ -z "$changed" ]; then
            echo "No added/modified files in range."
            exit 0
          fi

          fail=0

          # NEW .env files (except .env.example). Modifications to already-
          # tracked .env.dev / .env.staging are not flagged here — the content
          # check below catches real secrets regardless of filename.
          if [ -n "$added" ]; then
            env_hits="$(printf '%s\n' "$added" | grep -E '(^|/)\.env(\.[^/]+)?$' | grep -vE '\.env\.example$' || true)"
            if [ -n "$env_hits" ]; then
              echo "::error::new .env file(s) added in this PR:"
              printf '::error::  %s\n' $env_hits
              echo "::error::Use .env.example for templates. Never commit real values."
              fail=1
            fi

            # Other secret-shaped filenames (new files only)
            SECRET_PATTERNS=(
              '\.pem$'
              '\.key$'
              '_credentials\.json$'
              '(^|/)gcp-key\.json$'
              '\.p12$'
              '(^|/)id_(rsa|ed25519|ecdsa|dsa)$'
              '_token$'
              '(^|/)secrets\.ya?ml$'
            )
            for pat in "${SECRET_PATTERNS[@]}"; do
              hits="$(printf '%s\n' "$added" | grep -E "$pat" || true)"
              if [ -n "$hits" ]; then
                echo "::error::new secret-shaped file matching /$pat/ added:"
                printf '::error::  %s\n' $hits
                fail=1
              fi
            done
          fi

          # Sensitive KEY=value shapes in added diff lines
          SENSITIVE_VARS='OPENAI|ANTHROPIC|GOOGLE|GEMINI|AWS|GCP|AZURE|LASTBOT|ELASTIC|PRESENCE_SEED|GROK|XAI|TWILIO|STRIPE|GITHUB|HUGGINGFACE|HF_TOKEN|SLACK|DISCORD'
          diff_hits="$(
            git diff --no-color --diff-filter=AM -U0 "$base" "$head" -- $changed 2>/dev/null \
              | grep -E "^\+($SENSITIVE_VARS)[A-Z0-9_]*[[:space:]]*=[[:space:]]*['\"]?[A-Za-z0-9_./+=:-]{20,}['\"]?[[:space:]]*$" \
              || true
          )"
          if [ -n "$diff_hits" ]; then
            echo "::error::Sensitive KEY=value pattern in added lines:"
            printf '::error::  %s\n' "$diff_hits"
            echo "::error::Use placeholders in .env.example or move the value to a gitignored .env."
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::secret-guard CI failed. See docs/policies/SECURITY_HYGIENE.md in the umbrella repo."
            exit 1
          fi
          echo "secret-guard: clean."
